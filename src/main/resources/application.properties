spring.application.name=cjairport

# ===== 서버 =====
server.port=${SERVER_PORT:8080}
server.servlet.session.timeout=600
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.secure=${SSL_ENABLED:false}
# 운영은 SSL 활성화 (docs/deployment.md)
server.ssl.enabled=${SSL_ENABLED:false}

# ===== DB: MSSQL 단일 (비밀값은 환경변수/.env 로 주입, 커밋 금지) =====
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.url=${DB_MSSQL_URL:jdbc:sqlserver://localhost:1433;databaseName=CJ_AIRPORT;encrypt=true;trustServerCertificate=true}
spring.datasource.username=${DB_MSSQL_USERNAME:sa}
spring.datasource.password=${DB_MSSQL_PASSWORD:}

# ===== MyBatis =====
mybatis.config-location=classpath:mybatis-config.xml
mybatis.mapper-locations=classpath:mapper/**/*.xml

# ===== Thymeleaf =====
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=${THYMELEAF_CACHE:false}

# ===== 인코딩 =====
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

# ===== ARIA 암호화 키 (운영은 환경변수/Jasypt 로 주입 — 하드코딩 금지, docs/security.md) =====
app.crypto.aria-key=${ARIA_KEY:01234567890123456789012345678901}
