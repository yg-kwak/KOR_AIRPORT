<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('설정관리')}"></head>
<body>
<div th:replace="~{fragments/main :: header}"></div>
<div class="layout-container">
  <div th:replace="~{fragments/sidebar :: sidebar(${menus})}"></div>
  <main class="layout-content">
    <h2>설정관리</h2>

    <section class="content-card">
      <div class="setting-form">
        <div class="form-group wide">
          <label>BiostarX IP</label>
          <input type="text" id="biostarIp" class="input" placeholder="예: 192.168.0.10"
                 th:value="${system != null} ? ${system.biostarIp} : ''"/>
        </div>
        <div class="form-group">
          <label>BiostarX ID</label>
          <input type="text" id="biostarId" class="input" autocomplete="off"
                 th:value="${system != null} ? ${system.biostarId} : ''"/>
        </div>
        <div class="form-group">
          <label>BiostarX 비밀번호 <span class="form-hint">(변경 시에만 입력)</span></label>
          <input type="password" id="biostarPw" class="input" autocomplete="new-password"
                 placeholder="저장된 비밀번호를 유지하려면 비워두세요"/>
        </div>
        <div class="setting-actions">
          <button class="btn" id="btnTest">연결 테스트</button>
          <button class="btn btn-primary" id="btnSave" th:if="${perm.canCreate}">저장</button>
        </div>
      </div>
    </section>
  </main>
</div>

<div th:replace="~{fragments/components/confirm-modal :: confirmModal}"></div>

<script th:inline="javascript">
  window.PAGE_PERM = { canCreate: [[${perm.canCreate}]], canDelete: [[${perm.canDelete}]] };
</script>
<script src="/js/web/system/system.js" defer></script>
</body>
</html>
