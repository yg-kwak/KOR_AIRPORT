<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('권한메뉴관리')}"></head>
<body>
<div th:replace="~{fragments/main :: header}"></div>
<div class="layout-container">
  <div th:replace="~{fragments/sidebar :: sidebar(${menus})}"></div>
  <main class="layout-content">
    <div class="perm-layout">
      <!-- 좌: 저장된 사용자권한 목록 -->
      <section class="content-card perm-left">
        <div class="card-head">
          <span class="card-title">저장된 사용자권한 목록</span>
          <button class="btn btn-sm" id="btnNew" th:if="${perm.canCreate}">신규</button>
        </div>
        <table class="grid">
          <thead>
          <tr><th>권한명</th><th class="w-40"></th></tr>
          </thead>
          <tbody id="authList">
          <tr><td colspan="2" class="empty">불러오는 중...</td></tr>
          </tbody>
        </table>
      </section>

      <!-- 우: 사용자권한 설정 -->
      <section class="content-card perm-right">
        <div class="card-head">
          <span class="card-title">사용자권한 설정</span>
          <div class="perm-actions">
            <button class="btn" id="btnCancel">선택 취소</button>
            <button class="btn btn-danger-solid" id="btnDelete" th:if="${perm.canDelete}">권한 삭제</button>
            <button class="btn btn-primary" id="btnSave" th:if="${perm.canCreate}">수정완료</button>
          </div>
        </div>

        <div class="form-group">
          <label>권한명 입력 <span class="req">*</span></label>
          <input type="text" id="authName" class="input" placeholder="권한명"/>
        </div>

        <div class="perm-tree-head">
          <span class="form-group-label">권한메뉴 선택</span>
          <div class="perm-tree-btns" th:if="${perm.canCreate}">
            <button class="btn btn-sm" id="btnCheckAll">메뉴 전체선택</button>
            <button class="btn btn-sm" id="btnUncheckAll">메뉴 전체해제</button>
          </div>
        </div>
        <div class="perm-tree" id="permTree"></div>
      </section>
    </div>
  </main>
</div>

<div th:replace="~{fragments/components/confirm-modal :: confirmModal}"></div>

<script th:inline="javascript">
  window.PAGE_PERM = { canCreate: [[${perm.canCreate}]], canDelete: [[${perm.canDelete}]] };
</script>
<script src="/js/web/system/menuAuth.js" defer></script>
</body>
</html>
