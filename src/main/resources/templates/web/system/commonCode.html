<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('공통코드관리')}"></head>
<body>
<div th:replace="~{fragments/main :: header}"></div>
<div class="layout-container">
  <div th:replace="~{fragments/sidebar :: sidebar(${menus})}"></div>
  <main class="layout-content">
    <h2>공통코드관리</h2>

    <!-- 검색 -->
    <section class="search-section">
      <div class="search-field">
        <label>사용여부</label>
        <select id="useYnFilter" class="input w-120">
          <option value="">전체</option>
          <option value="Y">사용</option>
          <option value="N">미사용</option>
        </select>
      </div>
      <div class="search-field">
        <label>검색어</label>
        <div class="search-keyword">
          <select id="searchType" class="input w-120">
            <option value="all">전체</option>
            <option value="cmmId">코드구분ID</option>
            <option value="cmmName">코드구분명</option>
            <option value="codeId">코드ID</option>
            <option value="codeName">코드명</option>
          </select>
          <input type="text" id="keyword" class="input w-300" placeholder="검색어를 입력해주세요"/>
        </div>
      </div>
      <button class="btn btn-primary" id="btnSearch">검색</button>
      <button class="btn" id="btnReset">초기화</button>
    </section>

    <!-- 목록 -->
    <section class="content-card">
      <div class="grid-toolbar">
        <span class="grid-total" id="totalInfo"></span>
        <div class="grid-actions">
          <button class="btn" id="btnNew" th:if="${perm.canCreate}">등록</button>
          <select id="pageSize" class="input">
            <option value="30">30개씩 보기</option>
            <option value="50">50개씩 보기</option>
            <option value="100">100개씩 보기</option>
            <option value="200">200개씩 보기</option>
          </select>
        </div>
      </div>
      <table class="grid">
        <thead>
        <tr>
          <th class="w-160 sortable" data-sort="cmmId">코드구분ID<span class="sort-ind"></span></th>
          <th class="sortable" data-sort="cmmName">코드구분명<span class="sort-ind"></span></th>
          <th class="w-160 sortable" data-sort="codeId">코드ID<span class="sort-ind"></span></th>
          <th class="sortable" data-sort="codeName">코드명<span class="sort-ind"></span></th>
          <th class="w-80 sortable" data-sort="useYn">사용<span class="sort-ind"></span></th>
          <th class="w-120">관리</th>
        </tr>
        </thead>
        <tbody id="gridBody">
        <tr><td colspan="6" class="empty">조회 결과가 없습니다.</td></tr>
        </tbody>
      </table>
      <div class="paging" id="paging"></div>
    </section>
  </main>
</div>

<!-- 등록/수정 모달 (공통 조각화 대상 — 지금은 화면 내 인라인, 향후 web/components 로 이동) -->
<div class="modal-overlay" id="editModal">
  <div class="modal-container small">
    <div class="modal-header">
      <h2 class="modal-title" id="modalTitle">공통코드 등록</h2>
      <button class="modal-close" id="modalClose">&times;</button>
    </div>
    <div class="modal-body">
      <form id="editForm">
        <input type="hidden" id="mode" value="create"/>
        <div class="form-group">
          <label>코드구분ID</label>
          <input type="text" id="cmmId" name="cmmId" class="input" required/>
        </div>
        <div class="form-group">
          <label>코드구분명</label>
          <input type="text" id="cmmName" name="cmmName" class="input"/>
        </div>
        <div class="form-group">
          <label>코드ID</label>
          <input type="text" id="codeId" name="codeId" class="input" required/>
        </div>
        <div class="form-group">
          <label>코드명</label>
          <input type="text" id="codeName" name="codeName" class="input"/>
        </div>
        <div class="form-group">
          <label>사용여부</label>
          <select id="useYn" name="useYn" class="input">
            <option value="Y">사용</option>
            <option value="N">미사용</option>
          </select>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn" id="btnCancel">취소</button>
      <button class="btn btn-primary" id="btnSave">저장</button>
    </div>
  </div>
</div>

<!-- 공통 확인 모달 (fragments/components — 제목/내용은 confirmModal.open 으로 주입) -->
<div th:replace="~{fragments/components/confirm-modal :: confirmModal}"></div>

<!-- 메뉴 권한 → JS 전달 (행 버튼 노출 제어. 서버가 2차로 강제하므로 조작해도 실행 불가) -->
<script th:inline="javascript">
  window.PAGE_PERM = {
    canCreate: [[${perm.canCreate}]],
    canDelete: [[${perm.canDelete}]]
  };
</script>
<script src="/js/web/system/commonCode.js" defer></script>
</body>
</html>
