<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('로그인')}"></head>
<body class="login-body">
<div class="login-card">
  <h1 class="login-title">청주공항 출입관리시스템</h1>
  <form method="post" action="/login" class="login-form">
    <div class="form-group">
      <label for="userId">아이디</label>
      <input type="text" id="userId" name="userId" class="input" autocomplete="username" required autofocus/>
    </div>
    <div class="form-group">
      <label for="password">비밀번호</label>
      <input type="password" id="password" name="password" class="input" autocomplete="current-password" required/>
    </div>
    <p class="login-error" th:if="${error}" th:text="${error}"></p>
    <button type="submit" class="btn btn-primary btn-block">로그인</button>
  </form>
</div>
</body>
</html>
