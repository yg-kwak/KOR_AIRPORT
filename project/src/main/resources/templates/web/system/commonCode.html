<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('공통코드관리')}"></head>
<body>
<div th:replace="~{fragments/main :: header}"></div>
<div class="layout-container">
  <div th:replace="~{fragments/sidebar :: sidebar(${menus})}"></div>
  <main class="layout-content">
    <h2>공통코드관리</h2>

    <!-- 검색 -->
    <section class="search-section">
      <input type="text" id="keyword" class="input w-300" placeholder="코드구분/코드 검색"/>
      <button class="btn btn-primary" id="btnSearch">검색</button>
      <button class="btn" id="btnNew">신규</button>
    </section>

    <!-- 목록 -->
    <section class="content-card">
      <table class="grid">
        <thead>
        <tr>
          <th class="w-160">코드구분ID</th>
          <th>코드구분명</th>
          <th class="w-160">코드ID</th>
          <th>코드명</th>
          <th class="w-80">사용</th>
          <th class="w-120">관리</th>
        </tr>
        </thead>
        <tbody id="gridBody">
        <tr><td colspan="6" class="empty">조회 결과가 없습니다.</td></tr>
        </tbody>
      </table>
      <div class="paging" id="paging"></div>
    </section>
  </main>
</div>

<!-- 등록/수정 모달 (공통 조각화 대상 — 지금은 화면 내 인라인, 향후 web/components 로 이동) -->
<div class="modal-overlay" id="editModal">
  <div class="modal-container small">
    <div class="modal-header">
      <h2 class="modal-title" id="modalTitle">공통코드 등록</h2>
      <button class="modal-close" id="modalClose">&times;</button>
    </div>
    <div class="modal-body">
      <form id="editForm">
        <input type="hidden" id="mode" value="create"/>
        <div class="form-group">
          <label>코드구분ID</label>
          <input type="text" id="cmmId" name="cmmId" class="input" required/>
        </div>
        <div class="form-group">
          <label>코드구분명</label>
          <input type="text" id="cmmName" name="cmmName" class="input"/>
        </div>
        <div class="form-group">
          <label>코드ID</label>
          <input type="text" id="codeId" name="codeId" class="input" required/>
        </div>
        <div class="form-group">
          <label>코드명</label>
          <input type="text" id="codeName" name="codeName" class="input"/>
        </div>
        <div class="form-group">
          <label>사용여부</label>
          <select id="useYn" name="useYn" class="input">
            <option value="Y">사용</option>
            <option value="N">미사용</option>
          </select>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn" id="btnCancel">취소</button>
      <button class="btn btn-primary" id="btnSave">저장</button>
    </div>
  </div>
</div>

<script src="/js/web/system/commonCode.js" defer></script>
</body>
</html>
