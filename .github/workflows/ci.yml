name: CI

# 불변식(AGENTS.md §4)을 "선언"에서 "강제"로. PR/푸시 시 정적 검사 + 빌드.
# 아직 코드가 없으면 각 단계는 안전하게 통과(no-op)하고, 코드가 생기면 실제로 검사한다.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  invariants:
    name: 불변식 정적 검사
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: JPA 미사용 (@Entity / JpaRepository / data-jpa 금지)
        run: |
          if grep -rniE '@Entity|JpaRepository|spring-boot-starter-data-jpa' project/src build.gradle project/build.gradle 2>/dev/null; then
            echo "::error::JPA 흔적 발견 → 퍼시스턴스는 MyBatis 로 통일해야 합니다. @Entity/JpaRepository/ data-jpa 의존성을 제거하세요. (docs/database.md)"
            exit 1
          fi
          echo "OK: JPA 미사용"

      - name: 계층 경계 (Controller 에 인라인 SQL 금지)
        run: |
          # Java 소스에 SQL 키워드가 문자열로 조립된 흔적(휴리스틱)
          if grep -rniE '"\s*(select|insert|update|delete)\s' project/src/main/java 2>/dev/null; then
            echo "::error::Java 코드에 인라인 SQL 로 보이는 문자열이 있습니다 → 모든 SQL 은 mapper XML 로 옮기고 #{} 파라미터를 사용하세요. (docs/database.md)"
            exit 1
          fi
          echo "OK: 인라인 SQL 없음"

      - name: DB 단일화 (MariaDB 미사용)
        run: |
          if grep -rniE 'mariadb' project 2>/dev/null | grep -viE 'node_modules|/build/|/bin/'; then
            echo "::error::MariaDB 참조 발견 → 본 프로젝트는 MSSQL 단일입니다. (docs/database.md)"
            exit 1
          fi
          echo "OK: MSSQL 단일"

  secret-scan:
    name: 시크릿 스캔
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: 빌드 · 테스트
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: gradlew 존재 확인
        id: check
        run: |
          if [ -f project/gradlew ]; then echo "exists=true" >> "$GITHUB_OUTPUT"; else echo "exists=false" >> "$GITHUB_OUTPUT"; echo "프로젝트 코드가 아직 없어 빌드를 건너뜁니다."; fi

      - name: JDK 17
        if: steps.check.outputs.exists == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: build
        if: steps.check.outputs.exists == 'true'
        working-directory: project
        run: |
          chmod +x ./gradlew
          ./gradlew clean build --no-daemon
