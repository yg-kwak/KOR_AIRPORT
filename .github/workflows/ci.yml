name: CI

# 불변식(AGENTS.md §4)을 "선언"에서 "강제"로. PR/푸시 시 정적 검사 + 빌드.
# 주간 스케줄은 doc-gardening 의 기계 파트 — 문서·스키마 드리프트를 정기적으로 재검증한다.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 21 * * 0'   # 매주 월요일 06:00 KST — 문서/드리프트 정기 점검

jobs:
  invariants:
    name: 불변식 정적 검사
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: JPA 미사용 (@Entity / JpaRepository / data-jpa 금지)
        run: |
          if grep -rniE '@Entity|JpaRepository|spring-boot-starter-data-jpa' src build.gradle 2>/dev/null; then
            echo "::error::JPA 흔적 발견 → 퍼시스턴스는 MyBatis 로 통일해야 합니다. @Entity/JpaRepository/ data-jpa 의존성을 제거하세요. (docs/database.md)"
            exit 1
          fi
          echo "OK: JPA 미사용"

      - name: 계층 경계 (Java 에 인라인 SQL 금지)
        run: |
          if grep -rniE '"\s*(select|insert|update|delete)\s' src/main/java 2>/dev/null; then
            echo "::error::Java 코드에 인라인 SQL 로 보이는 문자열이 있습니다 → 모든 SQL 은 mapper XML 로 옮기고 #{} 파라미터를 사용하세요. (docs/database.md)"
            exit 1
          fi
          echo "OK: 인라인 SQL 없음"

      - name: DB 단일화 (MariaDB 미사용)
        run: |
          if grep -rniE 'mariadb' src build.gradle 2>/dev/null; then
            echo "::error::MariaDB 참조 발견 → 본 프로젝트는 MSSQL 단일입니다. (docs/database.md)"
            exit 1
          fi
          echo "OK: MSSQL 단일"

      - name: 파일 크기 제한 (Java≤500 / JS≤400)
        run: bash scripts/code-lint.sh

  docs:
    name: 문서 린트 · 스키마 드리프트
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 문서 링크·구조 검증
        run: bash scripts/docs-lint.sh
      - name: DDL ↔ database.md 드리프트
        run: bash scripts/schema-drift.sh

  secret-scan:
    name: 시크릿 스캔
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: 빌드 · 테스트 (ArchUnit 구조 테스트 포함)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: build
        run: |
          chmod +x ./gradlew
          ./gradlew clean build --no-daemon
